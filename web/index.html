<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>mini-gpt · playground</title>
<style>
  :root {
    --bg: #14161f;
    --panel: #1c1f2b;
    --border: #2b2f40;
    --text: #d5d9e6;
    --dim: #7d84a0;
    --accent: #7aa2f7;
    --accent-dark: #5577cc;
    --green: #9ece6a;
    --mono: ui-monospace, "Cascadia Code", Consolas, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    display: flex;
    align-items: baseline;
    gap: 14px;
    padding: 18px 26px 14px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  header h1 {
    margin: 0;
    font-size: 1.15rem;
    font-family: var(--mono);
    font-weight: 600;
    letter-spacing: .5px;
  }
  header h1 .accent { color: var(--accent); }
  #model-info {
    font-family: var(--mono);
    font-size: .74rem;
    color: var(--dim);
  }
  main {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 20px;
    padding: 20px 26px;
    flex: 1;
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
  }
  @media (max-width: 820px) { main { grid-template-columns: 1fr; } }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
  }
  label {
    display: flex;
    justify-content: space-between;
    font-size: .8rem;
    color: var(--dim);
    margin: 14px 0 4px;
  }
  label output { color: var(--text); font-family: var(--mono); }
  textarea {
    width: 100%;
    height: 90px;
    resize: vertical;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: .85rem;
    padding: 8px;
  }
  textarea:focus, input:focus { outline: 1px solid var(--accent-dark); }
  input[type=range] { width: 100%; accent-color: var(--accent); }
  button {
    width: 100%;
    margin-top: 18px;
    padding: 10px;
    border: none;
    border-radius: 6px;
    background: var(--accent);
    color: #10121a;
    font-weight: 600;
    font-size: .9rem;
    cursor: pointer;
    transition: background .15s;
  }
  button:hover { background: #90b3ff; }
  button.running { background: #e0616a; color: #fff; }
  #output-panel { display: flex; flex-direction: column; min-height: 420px; }
  #output {
    flex: 1;
    margin: 0;
    white-space: pre-wrap;
    word-break: break-word;
    font-family: var(--mono);
    font-size: .88rem;
    line-height: 1.55;
  }
  #output .prompt { color: var(--accent); }
  #output .caret {
    display: inline-block;
    width: 8px; height: 1em;
    background: var(--green);
    vertical-align: text-bottom;
    animation: blink 1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  #status {
    font-family: var(--mono);
    font-size: .72rem;
    color: var(--dim);
    margin-top: 10px;
  }
  footer {
    text-align: center;
    color: var(--dim);
    font-size: .72rem;
    padding: 10px 0 16px;
  }
  footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>

<header>
  <h1><span class="accent">mini-gpt</span> · playground</h1>
  <span id="model-info">chargement du modèle…</span>
</header>

<main>
  <section class="panel">
    <label for="prompt">Prompt</label>
    <textarea id="prompt" spellcheck="false">ROMEO:</textarea>

    <label for="tokens">Tokens à générer <output id="tokens-val">300</output></label>
    <input type="range" id="tokens" min="20" max="1000" step="10" value="300">

    <label for="temp">Température <output id="temp-val">0.80</output></label>
    <input type="range" id="temp" min="0.1" max="2" step="0.05" value="0.8">

    <label for="topk">Top-k (0 = désactivé) <output id="topk-val">40</output></label>
    <input type="range" id="topk" min="0" max="65" step="1" value="40">

    <button id="go">Générer</button>
  </section>

  <section class="panel" id="output-panel">
    <pre id="output"><span class="dim" style="color:var(--dim)">La génération apparaîtra ici, caractère par caractère…</span></pre>
    <div id="status"></div>
  </section>
</main>

<footer>
  Transformer décodeur entraîné from scratch (PyTorch, tokenizer caractère) ·
  <a href="https://github.com/karpathy/char-rnn" target="_blank" rel="noopener">corpus tinyshakespeare</a>
</footer>

<script>
  const $ = (id) => document.getElementById(id);
  let controller = null;

  // Affiche la valeur courante de chaque slider.
  for (const [slider, out, fmt] of [
    ["tokens", "tokens-val", (v) => v],
    ["temp", "temp-val", (v) => Number(v).toFixed(2)],
    ["topk", "topk-val", (v) => v === "0" ? "off" : v],
  ]) {
    $(slider).addEventListener("input", (e) => { $(out).textContent = fmt(e.target.value); });
  }

  // Bannière d'info modèle.
  fetch("/api/info").then(r => r.json()).then(info => {
    $("model-info").textContent =
      `${(info.n_params / 1e6).toFixed(1)}M params · ${info.n_layer} blocs · ` +
      `${info.n_head} têtes · ctx ${info.block_size} · val loss ${info.val_loss}`;
  }).catch(() => { $("model-info").textContent = "info modèle indisponible"; });

  async function generate() {
    const btn = $("go");
    if (controller) {            // clic pendant une génération = Stop
      controller.abort();
      return;
    }
    controller = new AbortController();
    btn.textContent = "■ Stop";
    btn.classList.add("running");

    const output = $("output");
    const prompt = $("prompt").value;
    output.innerHTML = "";
    const promptSpan = document.createElement("span");
    promptSpan.className = "prompt";
    promptSpan.textContent = prompt;
    const genSpan = document.createElement("span");
    const caret = document.createElement("span");
    caret.className = "caret";
    output.append(promptSpan, genSpan, caret);

    const t0 = performance.now();
    let count = 0;
    try {
      const resp = await fetch("/api/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        signal: controller.signal,
        body: JSON.stringify({
          prompt,
          max_new_tokens: Number($("tokens").value),
          temperature: Number($("temp").value),
          top_k: Number($("topk").value) || null,
        }),
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        throw new Error(err.error || `HTTP ${resp.status}`);
      }
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        const text = decoder.decode(value, { stream: true });
        count += text.length;
        genSpan.textContent += text;
        output.parentElement.scrollTop = output.parentElement.scrollHeight;
        const dt = (performance.now() - t0) / 1000;
        $("status").textContent =
          `${count} tokens · ${dt.toFixed(1)}s · ${(count / dt).toFixed(1)} tok/s`;
      }
    } catch (e) {
      if (e.name !== "AbortError") {
        $("status").textContent = `erreur : ${e.message}`;
      }
    } finally {
      caret.remove();
      controller = null;
      btn.textContent = "Générer";
      btn.classList.remove("running");
    }
  }

  $("go").addEventListener("click", generate);
  // Ctrl+Entrée dans le textarea lance la génération.
  $("prompt").addEventListener("keydown", (e) => {
    if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) generate();
  });
  // ?autorun=1 : lance une génération au chargement (démos, captures d'écran).
  if (new URLSearchParams(location.search).has("autorun")) generate();
</script>

</body>
</html>
